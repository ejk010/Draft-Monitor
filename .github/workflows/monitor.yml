name: Monitor Draft Status

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write # This is key

    steps:
      - name: Check out repo
        uses: actions/checkout@v4 # Updated to v4 for better stability

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 python-dateutil

      - name: Run check script
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python check.py

      - name: Commit and Push status file
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add last_status.txt
          
          # This line checks if there are changes before trying to commit
          if git diff --cached --quiet; then
            echo "No changes to draft status. Skipping push."
          else
            git commit -m "Update draft status"
            git push
          fi
